<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazing Fun Facts - Learn Something New Every Day!</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ==================== GLOBAL STYLES ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-purple: #8B5CF6;
            --secondary-pink: #EC4899;
            --accent-blue: #06B6D4;
            --dark-bg: #0F172A;
            --card-bg: #1E293B;
            --light-text: #E2E8F0;
            --gold: #FBBF24;
            --green: #10B981;
            --orange: #F97316;
            --red: #EF4444;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--dark-bg) 0%, #1a1a3e 50%, var(--dark-bg) 100%);
            color: var(--light-text);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
            scroll-behavior: smooth;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        /* ==================== HEADER / NAVBAR ==================== */
        header {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.9) 100%);
            backdrop-filter: blur(10px);
            padding: 1.5rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border-bottom: 2px solid rgba(139, 92, 246, 0.3);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-purple), var(--secondary-pink), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-family: 'Fredoka', sans-serif;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .logo i {
            font-size: 2rem;
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .theme-toggle, .filter-btn {
            background: linear-gradient(135deg, var(--primary-purple), var(--secondary-pink));
            border: none;
            color: white;
            padding: 0.7rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .theme-toggle:hover, .filter-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(139, 92, 246, 0.4);
        }

        .theme-toggle:active, .filter-btn:active {
            transform: translateY(-1px);
        }

        /* ==================== HERO SECTION ==================== */
        .hero {
            padding: 80px 2rem 60px;
            text-align: center;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero h1 {
            font-size: 4rem;
            font-family: 'Fredoka', sans-serif;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--primary-purple), var(--secondary-pink), var(--accent-blue), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: slideInUp 0.8s ease-out;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero p {
            font-size: 1.3rem;
            color: #CBD5E1;
            margin-bottom: 2rem;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
            animation: fadeIn 0.8s ease-out 0.3s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeIn 0.8s ease-out 0.6s both;
        }

        .btn-primary, .btn-secondary {
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-purple), var(--secondary-pink));
            color: white;
            box-shadow: 0 5px 20px rgba(139, 92, 246, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.6);
        }

        .btn-secondary {
            background: transparent;
            color: var(--accent-blue);
            border: 2px solid var(--accent-blue);
        }

        .btn-secondary:hover {
            background: var(--accent-blue);
            color: white;
            transform: translateY(-3px);
        }

        /* ==================== FILTER SECTION ==================== */
        .filter-section {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin: 40px 2rem;
            animation: slideInUp 0.8s ease-out 0.4s both;
        }

        .filter-tag {
            padding: 8px 16px;
            background: rgba(139, 92, 246, 0.2);
            border: 2px solid var(--primary-purple);
            color: var(--accent-blue);
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .filter-tag:hover, .filter-tag.active {
            background: linear-gradient(135deg, var(--primary-purple), var(--secondary-pink));
            color: white;
            border-color: var(--secondary-pink);
            transform: scale(1.05);
        }

        /* ==================== FACTS GRID ==================== */
        .facts-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .facts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
        }

        /* ==================== FACT CARD ==================== */
        .fact-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8), rgba(30, 41, 59, 0.5));
            border: 2px solid rgba(139, 92, 246, 0.3);
            border-radius: 15px;
            padding: 2rem;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.320, 1);
            animation: scaleIn 0.6s ease-out forwards;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .fact-card:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: var(--secondary-pink);
            box-shadow: 0 20px 40px rgba(139, 92, 246, 0.3);
        }

        .fact-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.2), transparent);
            transition: all 0.6s ease;
        }

        .fact-card:hover::before {
            top: -10%;
            right: -10%;
        }

        .fact-card-content {
            position: relative;
            z-index: 2;
        }

        .fact-category {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: linear-gradient(135deg, var(--primary-purple), var(--secondary-pink));
            color: white;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .fact-category.science {
            background: linear-gradient(135deg, var(--accent-blue), var(--green));
        }

        .fact-category.history {
            background: linear-gradient(135deg, var(--gold), var(--orange));
        }

        .fact-category.nature {
            background: linear-gradient(135deg, var(--green), #06B6D4);
        }

        .fact-category.space {
            background: linear-gradient(135deg, #8B5CF6, #06B6D4);
        }

        .fact-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .fact-card:nth-child(2) .fact-icon {
            animation-delay: 0.2s;
        }

        .fact-card:nth-child(3) .fact-icon {
            animation-delay: 0.4s;
        }

        .fact-card:nth-child(4) .fact-icon {
            animation-delay: 0.6s;
        }

        .fact-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
            color: #F1F5F9;
            font-family: 'Fredoka', sans-serif;
        }

        .fact-text {
            font-size: 1rem;
            color: #CBD5E1;
            line-height: 1.8;
            margin-bottom: 1rem;
        }

        .fact-source {
            font-size: 0.85rem;
            color: #64748B;
            font-style: italic;
            padding-top: 1rem;
            border-top: 1px solid rgba(139, 92, 246, 0.2);
        }

        .fact-rating {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(139, 92, 246, 0.2);
        }

        .fact-rating span {
            color: var(--gold);
            font-weight: 600;
        }

        .star {
            color: var(--gold);
            font-size: 0.9rem;
        }

        /* ==================== LOAD MORE BUTTON ==================== */
        .load-more-container {
            text-align: center;
            margin: 3rem 0;
        }

        .load-more-btn {
            padding: 15px 40px;
            background: linear-gradient(135deg, var(--primary-purple), var(--secondary-pink));
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(139, 92, 246, 0.4);
        }

        .load-more-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.6);
        }

        .load-more-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ==================== FOOTER ==================== */
        footer {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.9) 0%, rgba(30, 41, 59, 0.8) 100%);
            border-top: 2px solid rgba(139, 92, 246, 0.3);
            padding: 3rem 2rem;
            text-align: center;
            margin-top: 4rem;
            animation: slideInUp 0.8s ease-out;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-text {
            color: #CBD5E1;
            margin-bottom: 1rem;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin: 1.5rem 0;
        }

        .social-link {
            display: inline-flex;
            width: 45px;
            height: 45px;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary-purple), var(--secondary-pink));
            color: white;
            border-radius: 50%;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 5px 20px rgba(139, 92, 246, 0.4);
        }

        .footer-quote {
            font-style: italic;
            color: var(--accent-blue);
            font-size: 1.1rem;
            margin-top: 2rem;
            padding: 1rem;
            border-left: 4px solid var(--secondary-pink);
            text-align: left;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* ==================== MODAL STYLES ==================== */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            animation: fadeIn 0.3s ease;
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: linear-gradient(135deg, var(--card-bg), #1a2a3a);
            border: 2px solid var(--primary-purple);
            border-radius: 15px;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            animation: slideInUp 0.3s ease;
        }

        .modal-close {
            float: right;
            font-size: 2rem;
            cursor: pointer;
            color: #CBD5E1;
            transition: color 0.3s ease;
        }

        .modal-close:hover {
            color: var(--secondary-pink);
        }

        .modal-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #F1F5F9;
            font-family: 'Fredoka', sans-serif;
        }

        .modal-text {
            color: #CBD5E1;
            line-height: 1.8;
            margin-bottom: 1rem;
        }

        /* ==================== RESPONSIVE DESIGN ==================== */
        @media (max-width: 768px) {
            .logo {
                font-size: 1.3rem;
            }

            .hero h1 {
                font-size: 2.5rem;
            }

            .hero p {
                font-size: 1rem;
            }

            .facts-grid {
                grid-template-columns: 1fr;
            }

            .filter-section {
                margin: 30px 1rem;
            }

            .hero-buttons {
                gap: 0.5rem;
            }

            .btn-primary, .btn-secondary {
                padding: 10px 20px;
                font-size: 0.9rem;
            }

            .nav-buttons {
                gap: 0.5rem;
            }

            .theme-toggle, .filter-btn {
                padding: 0.5rem 0.8rem;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            header {
                padding: 1rem;
            }

            .header-content {
                flex-direction: column;
                gap: 1rem;
            }

            .logo {
                font-size: 1.1rem;
            }

            .hero {
                padding: 40px 1rem 30px;
            }

            .hero h1 {
                font-size: 1.8rem;
            }

            .hero p {
                font-size: 0.9rem;
            }

            .facts-container {
                padding: 1rem;
            }

            .fact-card {
                padding: 1.5rem;
            }

            .fact-title {
                font-size: 1.1rem;
            }

            .fact-text {
                font-size: 0.9rem;
            }

            .modal-content {
                padding: 1.5rem;
                width: 95%;
            }

            .filter-section {
                margin: 20px 0.5rem;
            }

            .filter-tag {
                padding: 6px 12px;
                font-size: 0.85rem;
            }
        }

        /* ==================== SCROLLBAR STYLING ==================== */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--dark-bg);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, var(--primary-purple), var(--secondary-pink));
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, var(--secondary-pink), var(--accent-blue));
        }

        /* ==================== UTILITY CLASSES ==================== */
        .hidden {
            display: none !important;
        }
    </style>
</head>
